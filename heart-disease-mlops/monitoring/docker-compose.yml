# One-command monitoring stack for the demo (assignment task 8):
#   docker compose -f monitoring/docker-compose.yml up --build
#
#   API      -> http://localhost:8000  (/predict, /metrics)
#   Prometheus -> http://localhost:9090
#   Grafana  -> http://localhost:3000  (admin / admin)
services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: heart-disease-api
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
